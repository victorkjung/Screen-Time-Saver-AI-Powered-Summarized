# Screen Time Saver — example configuration
# Copy this file to config.yaml and customise it.

# Your Anthropic API key (or use an environment variable).
anthropic_api_key: "${ANTHROPIC_API_KEY}"

# ── Content sources ──────────────────────────────────────────────
sources:
  # YouTube channels — transcripts are extracted automatically.
  - name: "3Blue1Brown"
    platform: youtube
    channel_url: "https://www.youtube.com/@3blue1brown"
    max_items: 3

  - name: "Fireship"
    platform: youtube
    channel_url: "https://www.youtube.com/@Fireship"
    max_items: 5

  # RSS feeds — works with any blog, news site, or podcast feed.
  - name: "TechCrunch"
    platform: rss
    feed_url: "https://techcrunch.com/feed/"
    max_items: 10

  - name: "Hacker News – Best"
    platform: rss
    feed_url: "https://hnrss.org/best"
    max_items: 10

  # Twitter / X — uses Nitter RSS (public profiles only).
  - name: "Elon Musk"
    platform: twitter
    handle: "elonmusk"
    max_items: 5

# ── Output settings ──────────────────────────────────────────────
output:
  directory: "./output"
  audio_format: "mp3"
  # Run `screen-time-saver list-voices` to see all available voices.
  voice: "en-US-AndrewMultilingualNeural"
  speech_rate: "+10%"          # slightly faster for a digest feel
  max_audio_minutes: 10

# ── Summariser settings ──────────────────────────────────────────
summarizer:
  model: "claude-sonnet-4-20250514"
  max_tokens: 4096
  style: "podcast"             # podcast | newsletter | briefing

# ── Delivery — how the digest reaches you ────────────────────────
# Enable one or both backends. Disabled by default.
delivery:
  # Twilio — receive your digest as a phone call.
  twilio:
    enabled: false
    account_sid: "${TWILIO_ACCOUNT_SID}"
    auth_token: "${TWILIO_AUTH_TOKEN}"
    from_phone: "+15551234567"       # your Twilio number
    to_phone: "+15559876543"         # your personal number
    # Public URL where Twilio can fetch the MP3.
    # Use an S3 bucket, ngrok tunnel, or any static host.
    audio_base_url: "https://your-host.example.com/audio"
    local_server_port: 8765          # fallback local file server

  # Telegram — receive the digest as an audio message in a chat.
  telegram:
    enabled: false
    bot_token: "${TELEGRAM_BOT_TOKEN}"   # from @BotFather
    chat_id: "123456789"                 # your chat or channel ID
